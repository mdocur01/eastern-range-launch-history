name: Daily Launch Data Update

on:
  schedule:
    - cron: '0 9 * * *'   # Runs every day at 9 AM UTC (adjust if needed)
  workflow_dispatch:      # Allows manual run from GitHub

jobs:
  update-launches:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch latest launches
        run: |
          curl -s "https://ll.thespacedevs.com/2.2/launch/?mode=detailed&limit=200&ordering=-net" > latest_launches.json

      - name: Update timestamp
        run: |
          echo "Last updated: $(date)" > LAST_UPDATED.txt

      - name: Commit and push changes
        run: |
          git config user.name "GitHub Action Bot"
          git config user.email "action@github.com"
          git add .
          git commit -m "Daily launch data update [automated]" || echo "No changes to commit"
          git push
