name: Daily Launch Data Update

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create timestamp file
        run: |
          echo "Last updated: $(date -u +'%Y-%m-%d %H:%M UTC')" > LAST_UPDATED.txt
          ls -la

      - name: Commit changes
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add LAST_UPDATED.txt
          git commit -m "Daily launch data update [automated]" || echo "No changes"
          git push
